<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrbChase - Multiplayer 2D Arena</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0a0a1a;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;

  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
